<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>the box — catnip</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📦</text></svg>">
<meta name="description" content="If it fits, it sits. Time the sliding box and let your virtual cat leap in to earn jelly. catnip 미니게임: 미끄러지는 상자 타이밍에 맞춰 고양이를 쏙 넣어주세요.">
<meta property="og:title" content="the box — catnip · 박스">
<meta property="og:description" content="If i fits, i sits — tap when the cardboard box slides under your cat. 상자가 고양이 밑을 지날 때 탭하면 쏙!">
<meta property="og:type" content="website">
<style>
  :root{
    --paper:#e8e1ce;
    --paper-hi:#f3eddc;
    --ink:#33291d;
    --ink-soft:#6f6350;
    --rust:#a44a2a;
    --mono:ui-monospace,"SF Mono",Menlo,Consolas,monospace;
    --serif:"Iowan Old Style","Palatino Linotype",Palatino,Georgia,serif;
  }
  html,body{height:100%}
  body{
    margin:0;overflow:hidden;background:var(--paper);color:var(--ink);
    font-family:var(--serif);
    background-image:url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" width="160" height="160"><filter id="n"><feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2"/><feColorMatrix values="0 0 0 0 0.35 0 0 0 0 0.30 0 0 0 0 0.22 0 0 0 0.05 0"/></filter><rect width="160" height="160" filter="url(%23n)"/></svg>');
  }
  .stage{position:relative;height:100vh;min-height:520px;overflow:hidden}
  .stage canvas{position:absolute;inset:0;width:100%;height:100%;display:block}
  #ov{touch-action:none}
  #ov.playing{cursor:pointer}
  .overlay{position:absolute;inset:0;pointer-events:none}
  .overlay .ui{pointer-events:auto}

  .hud-top{
    position:absolute;top:0;left:0;right:0;
    display:flex;justify-content:space-between;align-items:center;
    padding:20px 28px;font-family:var(--mono);font-size:13px;
  }
  .wordmark{font-weight:700;font-size:15px;color:var(--ink);text-decoration:none}
  .stat{background:var(--paper-hi);border:1px solid var(--ink);padding:5px 12px;font-weight:600;margin-left:8px}

  .panel{
    position:absolute;inset:0;display:grid;place-items:center;
    background:rgba(232,225,206,.75);backdrop-filter:blur(3px);
  }
  .panel .card{
    background:var(--paper-hi);border:1px solid var(--ink);
    padding:32px 40px;display:flex;flex-direction:column;gap:16px;align-items:center;
    font-family:var(--mono);text-align:center;
  }
  .panel h2{margin:0;font-family:var(--serif);font-weight:500;font-size:24px}
  .panel .hint{font-size:11.5px;color:var(--ink-soft);max-width:260px;line-height:1.7}
  .panel .big{font-size:40px;font-weight:700}
  .row{display:flex;gap:10px}
  .btn{
    appearance:none;border:1px solid var(--ink);background:var(--paper-hi);color:var(--ink);
    font-family:var(--mono);font-size:12px;letter-spacing:.06em;
    padding:10px 18px;cursor:pointer;
  }
  .btn.primary{background:var(--ink);color:var(--paper-hi)}
  #toast{
    position:absolute;top:72px;left:50%;transform:translateX(-50%);
    background:var(--ink);color:var(--paper-hi);
    font-family:var(--mono);font-size:12px;padding:9px 16px;
    opacity:0;transition:opacity .25s;pointer-events:none;
  }
  #toast.show{opacity:1}
  .fallback{
    position:absolute;inset:0;display:none;place-items:center;
    font-family:var(--mono);font-size:13px;color:var(--rust);
  }
  .hidden{display:none !important}
</style>
</head>
<body>
<section class="stage">
  <canvas id="tl"></canvas>
  <canvas id="gl"></canvas>
  <canvas id="ov"></canvas>
  <div class="fallback" id="fallback">WebGL2 required.</div>
  <div class="overlay">
    <div class="hud-top">
      <a class="wordmark" href="../">catnip</a>
      <div>
        <span class="stat" id="timeBox">60</span>
        <span class="stat"><span id="scoreN">0</span> 📦</span>
        <span class="stat">🐾 <span id="jellyN">0</span></span>
      </div>
    </div>

    <div class="panel ui" id="startPanel">
      <div class="card">
        <h2 data-i18n-local="title"></h2>
        <div class="hint" data-i18n-local="hint"></div>
        <button class="btn primary" id="startBtn" data-i18n-local="start"></button>
        <a class="btn" href="../" data-i18n-local="home"></a>
      </div>
    </div>

    <div class="panel ui hidden" id="endPanel">
      <div class="card">
        <h2 data-i18n-local="done"></h2>
        <div class="big"><span id="finalScore">0</span> <span style="font-size:16px" data-i18n-local="score"></span></div>
        <div style="font-size:13px"><span data-i18n-local="combo"></span> ×<span id="comboN">0</span></div>
        <div style="font-size:14px"><span data-i18n-local="earned"></span> +<span id="earnedN">0</span> 🐾</div>
        <div class="row">
          <button class="btn primary" id="againBtn" data-i18n-local="again"></button>
          <a class="btn" href="../" data-i18n-local="home"></a>
        </div>
      </div>
    </div>

    <div id="toast"></div>
  </div>
</section>

<script type="module">
import { CatStage } from '../engine/cat-stage.js';
import * as store from '../engine/save.js';
import { lang } from '../engine/i18n.js';

document.documentElement.lang = lang;

// ── 로컬 사전 (engine/i18n.js 수정 금지) ─────────────────────
const DICT = {
  en: {
    title: 'the box',
    hint: 'wait for the cardboard box to slide under your cat — then tap (or space) to leap in!',
    done: 'time!', stamp: 'if i fits, i sits',
    score: 'sits', combo: 'best combo', earned: 'earned',
    again: 'play again', home: 'home', start: 'start',
    miss: 'so close!',
  },
  ko: {
    title: '박스',
    hint: '골판지 상자가 고양이 밑으로 미끄러져 올 때 탭(또는 스페이스)하면 쏙 들어가요!',
    done: '끝!', stamp: 'if i fits, i sits',
    score: '앉기', combo: '최대 콤보', earned: '획득',
    again: '다시 하기', home: '집으로', start: '시작',
    miss: '아깝다!',
  },
};
const L = (k) => (DICT[lang] && DICT[lang][k]) || DICT.en[k] || k;
document.querySelectorAll('[data-i18n-local]').forEach(el => { el.textContent = L(el.dataset.i18nLocal); });

const $ = (id) => document.getElementById(id);
let state = store.load();
if (!state.cat) location.href = '../';   // 입양 전이면 홈으로

let stage;
try {
  stage = new CatStage({ tl: $('tl'), gl: $('gl'), ov: $('ov'), breeds: [state.cat?.breed ?? 0] });
} catch (e) {
  $('fallback').style.display = 'grid';
  $('fallback').textContent = 'WebGL2 required.';
  throw e;
}

const ROUND = 60;
const JUMP_MS = 400;       // 점프 한 사이클
const SIT_HOLD = 1000;     // 상자 안에 앉아있는 시간
const SIT_FADE = 300;      // 상자 페이드아웃
let playing = false;
let score = 0, combo = 0, maxCombo = 0;
let timeLeft = ROUND;
let timerId = null;
let lastT = 0;

let box = null;            // { x, dir, speed }  — 현재 미끄러지는 상자
let nextSpawn = null;      // 다음 상자 등장 시각(ms); null이면 최초 진입 시 예약
let jump = null;           // { t0, baseX, judged, success, landX }
let sit = null;            // { t0, boxX }
let wantJump = false;      // 입력 플래그 (onFrame 에서 소비)

const rnd = (a, b) => a + Math.random() * (b - a);

$('jellyN').textContent = state.jelly;

function toast(msg, ms = 1200) {
  const el = $('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(el._t);
  el._t = setTimeout(() => el.classList.remove('show'), ms);
}

function requestJump() {
  if (!playing || jump || sit) return;
  wantJump = true;
}
$('ov').addEventListener('pointerdown', requestJump);
addEventListener('keydown', (e) => {
  if (e.code === 'Space') { e.preventDefault(); requestJump(); }
});

function startRound() {
  score = 0; combo = 0; maxCombo = 0; timeLeft = ROUND;
  box = null; jump = null; sit = null; wantJump = false; nextSpawn = null; lastT = 0;
  $('scoreN').textContent = '0';
  $('timeBox').textContent = ROUND;
  $('startPanel').classList.add('hidden');
  $('endPanel').classList.add('hidden');
  $('ov').classList.add('playing');
  stage.setExtraOffset(0, 0);
  playing = true;
  timerId = setInterval(() => {
    timeLeft--;
    $('timeBox').textContent = timeLeft;
    if (timeLeft <= 0) endRound();
  }, 1000);
}

function endRound() {
  playing = false;
  clearInterval(timerId);
  $('ov').classList.remove('playing');
  stage.setExtraOffset(0, 0);
  stage.lookOverride = null;
  box = null; jump = null; sit = null;
  const earned = score * 2 + maxCombo;
  state = store.mutate((s) => {
    s.jelly += earned;
    s.stats.boxCatches = (s.stats.boxCatches || 0) + score;
    s.stats.boxBest = Math.max(s.stats.boxBest || 0, score);
  });
  $('finalScore').textContent = score;
  $('comboN').textContent = maxCombo;
  $('earnedN').textContent = earned;
  $('jellyN').textContent = state.jelly;
  $('endPanel').classList.remove('hidden');
}

$('startBtn').onclick = startRound;
$('againBtn').onclick = startRound;

// ── 골판지 상자 정면 뷰 ─────────────────────────────────────
function drawBox(octx, x, floorY, w, h, alpha) {
  const top = floorY - h;
  octx.save();
  octx.globalAlpha = alpha;
  octx.lineJoin = 'round';
  octx.strokeStyle = '#8a6d42';
  octx.lineWidth = 2;

  // 덮개 플랩 2장 (몸통 위로 바깥으로 벌어짐)
  const fw = w * 0.52, fh = h * 0.44;
  octx.fillStyle = '#bf9c68';
  octx.beginPath();
  octx.moveTo(x - w / 2, top);
  octx.lineTo(x - 1, top);
  octx.lineTo(x - fw * 0.4, top - fh);
  octx.lineTo(x - w / 2 - fw * 0.22, top - fh * 0.68);
  octx.closePath(); octx.fill(); octx.stroke();
  octx.beginPath();
  octx.moveTo(x + w / 2, top);
  octx.lineTo(x + 1, top);
  octx.lineTo(x + fw * 0.4, top - fh);
  octx.lineTo(x + w / 2 + fw * 0.22, top - fh * 0.68);
  octx.closePath(); octx.fill(); octx.stroke();

  // 몸통
  octx.fillStyle = '#c9a876';
  octx.beginPath();
  octx.rect(x - w / 2, top, w, h);
  octx.fill(); octx.stroke();

  // 개구부 안쪽 그림자
  octx.fillStyle = 'rgba(80,60,38,0.30)';
  octx.fillRect(x - w / 2 + 2, top + 2, w - 4, h * 0.15);

  // 중앙 이음새 + 테이프 자국
  octx.strokeStyle = 'rgba(138,109,66,0.55)';
  octx.lineWidth = 1.5;
  octx.beginPath();
  octx.moveTo(x, top + h * 0.17); octx.lineTo(x, floorY);
  octx.stroke();
  octx.fillStyle = 'rgba(214,195,154,0.5)';
  octx.fillRect(x - w * 0.16, top + h * 0.44, w * 0.32, h * 0.1);

  octx.restore();
}

function drawStamp(octx, x, y, alpha) {
  octx.save();
  octx.globalAlpha = alpha;
  octx.translate(x, y);
  octx.rotate(-0.13);
  octx.font = 'italic 700 20px Georgia, serif';
  octx.textAlign = 'center';
  octx.textBaseline = 'middle';
  octx.fillStyle = '#a44a2a';
  octx.fillText(L('stamp'), 0, 0);
  octx.restore();
}

// ── 게임 루프 (stage.onFrame 훅) ────────────────────────────
stage.onFrame = (t, octx, { center }) => {
  if (!playing) return;
  stage.petMeter = 0;                 // 눈 감김 방지

  const dt = lastT ? Math.min(64, t - lastT) : 16;
  lastT = t;

  const R = center.R;
  const floorY = center.y + R * 2.3;
  const boxW = R * 1.3, boxH = R * 1.15;
  const baseX = center.x - stage.extra.x;   // 고양이 정지 중심 x

  // 최초 진입 후 첫 상자 예약
  if (nextSpawn === null) nextSpawn = t + 700;

  // 상자 등장 (점프/앉기 중이 아닐 때만)
  if (!box && !jump && !sit && t >= nextSpawn) {
    const dir = Math.random() < 0.5 ? 1 : -1;
    const elapsedFrac = (ROUND - timeLeft) / ROUND;
    const speed = 250 + elapsedFrac * 360;         // px/s, 후반 가속
    box = { x: dir > 0 ? -boxW : innerWidth + boxW, dir, speed };
  }

  // 상자 이동 (앉기 중엔 정지)
  if (box && !sit) {
    box.x += box.dir * box.speed * dt / 1000;
    if (box.dir > 0 && box.x > innerWidth + boxW) { box = null; nextSpawn = t + rnd(1200, 2200); }
    else if (box.dir < 0 && box.x < -boxW) { box = null; nextSpawn = t + rnd(1200, 2200); }
  }

  // 시선: 상자를 쫓음
  if (box) stage.lookOverride = { x: box.x, y: floorY };
  else stage.lookOverride = null;

  // 점프 시작
  if (wantJump && !jump && !sit) {
    jump = { t0: t, baseX, judged: false, success: false, landX: 0 };
    wantJump = false;
  }

  // 점프 애니메이션 + 정점 판정
  if (jump) {
    const p = (t - jump.t0) / JUMP_MS;

    // 정점(0.5)에서 1회 판정
    if (!jump.judged && p >= 0.5) {
      jump.judged = true;
      if (box && Math.abs(box.x - jump.baseX) < R * 0.55) {
        jump.success = true;
        box.dir = 0; box.speed = 0;                // 상자 고정
        jump.landX = box.x - jump.baseX;           // 상자 위로 내려앉기
        score++;
        combo++;
        maxCombo = Math.max(maxCombo, combo);
        $('scoreN').textContent = score;
        stage.react('happy');
        if (combo > 1) toast('×' + combo);
      } else {
        combo = 0;
        toast(L('miss'));
      }
    }

    if (p >= 1) {
      if (jump.success) {
        stage.setExtraOffset(jump.landX, 0);
        sit = { t0: t, boxX: jump.baseX + jump.landX };
      } else {
        stage.setExtraOffset(0, 0);
      }
      jump = null;
    } else {
      const up = Math.sin(Math.min(p, 1) * Math.PI) * -R * 0.8;
      let ox = 0;
      if (jump.success) ox = jump.landX * Math.max(0, (p - 0.5) / 0.5);
      stage.setExtraOffset(ox, up);
    }
  }

  // 앉기 연출 (상자 안에 쏙) + 도장 + 페이드
  let boxAlpha = 1;
  if (sit) {
    const el = t - sit.t0;
    boxAlpha = el <= SIT_HOLD ? 1 : Math.max(0, 1 - (el - SIT_HOLD) / SIT_FADE);
    if (el >= SIT_HOLD + SIT_FADE) {
      stage.setExtraOffset(0, 0);
      box = null; sit = null;
      nextSpawn = t + rnd(1200, 2200);
    }
  }

  // 상자 드로잉 — 고양이 위에 그려 하반신을 가려 "상자 속" 연출
  if (box) {
    const bx = sit ? sit.boxX : box.x;
    drawBox(octx, bx, floorY, boxW, boxH, boxAlpha);
    if (sit) drawStamp(octx, bx, floorY - boxH - R * 0.5, boxAlpha);
  }
};
</script>
</body>
</html>

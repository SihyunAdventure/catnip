<meta property="og:title" content="which cat are you? — catnip">

<style>
  :root{
    --paper:#e8e1ce;
    --paper-hi:#f3eddc;
    --ink:#33291d;
    --ink-soft:#6f6350;
    --rust:#a44a2a;
    --mono:ui-monospace,"SF Mono",Menlo,Consolas,monospace;
    --serif:"Iowan Old Style","Palatino Linotype",Palatino,Georgia,serif;
  }
  html,body{height:100%}
  body{
    margin:0;overflow:hidden;background:var(--paper);color:var(--ink);
    font-family:var(--serif);
    background-image:url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" width="160" height="160"><filter id="n"><feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2"/><feColorMatrix values="0 0 0 0 0.35 0 0 0 0 0.30 0 0 0 0 0.22 0 0 0 0.05 0"/></filter><rect width="160" height="160" filter="url(%23n)"/></svg>');
  }
  .stage{position:relative;height:100vh;height:100dvh;min-height:520px;overflow:hidden}
  .stage canvas{position:absolute;inset:0;width:100%;height:100%;display:block}
  .overlay{position:absolute;inset:0;pointer-events:none}
  .overlay .ui{pointer-events:auto}

  .hud-top{
    position:absolute;top:0;left:0;right:0;
    display:flex;justify-content:space-between;align-items:center;
    padding:20px 28px;font-family:var(--mono);font-size:13px;
    padding:calc(20px + env(safe-area-inset-top)) 28px 20px;
  }
  .wordmark{font-weight:700;font-size:15px;color:var(--ink);text-decoration:none}
  .stat{background:var(--paper-hi);border:1px solid var(--ink);padding:5px 12px;font-weight:600}

  .panel{
    position:absolute;inset:0;display:grid;place-items:center;
    background:rgba(232,225,206,.75);backdrop-filter:blur(3px);
  }
  .panel .card{
    background:var(--paper-hi);border:1px solid var(--ink);
    padding:30px 34px;display:flex;flex-direction:column;gap:16px;align-items:center;
    font-family:var(--mono);text-align:center;
  }
  .panel h2{margin:0;font-family:var(--serif);font-weight:500;font-size:26px}
  .panel .hint{font-size:11.5px;color:var(--ink-soft);max-width:280px;line-height:1.7}

  .btn{
    appearance:none;border:1px solid var(--ink);background:var(--paper-hi);color:var(--ink);
    font-family:var(--mono);font-size:12px;letter-spacing:.06em;
    padding:10px 18px;cursor:pointer;text-decoration:none;
  }
  .btn.primary{background:var(--ink);color:var(--paper-hi)}
  .btn:focus-visible{outline:2px solid var(--rust);outline-offset:-2px}
  .row{display:flex;gap:8px;flex-wrap:wrap;justify-content:center}

  /* ── 문항 ── */
  .quiz-card{
    background:var(--paper-hi);border:1px solid var(--ink);
    padding:22px 24px;width:calc(100% - 48px);max-width:440px;
    display:flex;flex-direction:column;gap:12px;font-family:var(--mono);
  }
  .progress{width:100%;height:5px;background:rgba(51,41,29,.15)}
  .progress .fill{height:100%;background:var(--rust);width:0;transition:width .32s}
  .qnum{font-size:11px;color:var(--ink-soft);letter-spacing:.12em}
  .q{font-family:var(--serif);font-size:22px;line-height:1.35;margin:2px 0 4px}
  .opts{display:flex;flex-direction:column;gap:8px}
  .opt{
    appearance:none;border:1px solid var(--ink);background:var(--paper);color:var(--ink);
    font-family:var(--mono);font-size:13px;line-height:1.45;text-align:left;
    padding:12px 14px;cursor:pointer;transition:background .12s,color .12s;
  }
  .opt:hover,.opt:focus-visible{background:var(--ink);color:var(--paper-hi);outline:none}
  .backrow{display:flex;justify-content:flex-start;margin-top:2px}
  .backrow .btn:disabled{opacity:.3;cursor:default}

  /* ── 결과 ── */
  .result-head{
    position:absolute;top:11%;left:0;right:0;text-align:center;padding:0 20px;
  }
  .result-head .kicker{font-family:var(--mono);font-size:11px;letter-spacing:.16em;color:var(--ink-soft)}
  .result-head h1{font-family:var(--serif);font-weight:500;font-size:clamp(26px,5.5vw,40px);margin:6px 0 0}
  .result-card{
    position:absolute;left:50%;bottom:26px;transform:translateX(-50%);
    bottom:calc(26px + env(safe-area-inset-bottom));
    width:calc(100% - 44px);max-width:452px;
    background:var(--paper-hi);border:1px solid var(--ink);
    padding:20px 22px;display:flex;flex-direction:column;gap:12px;
    font-family:var(--mono);
  }
  .result-card .desc{font-family:var(--serif);font-size:15px;line-height:1.62}
  .result-card .compat{font-size:11.5px;color:var(--rust);line-height:1.55}

  #toast{
    position:absolute;top:72px;left:50%;transform:translateX(-50%);
    background:var(--ink);color:var(--paper-hi);
    font-family:var(--mono);font-size:12px;padding:9px 16px;
    opacity:0;transition:opacity .25s;pointer-events:none;white-space:nowrap;
  }
  #toast.show{opacity:1}
  .fallback{
    position:absolute;inset:0;display:none;place-items:center;
    font-family:var(--mono);font-size:13px;color:var(--rust);text-align:center;padding:0 20px;
  }
  .hidden{display:none !important}
</style>
</head>

<section class="stage" aria-label="which cat are you">

  <div class="overlay">

    <div class="panel ui" id="introPanel">

        <button class="btn primary" id="startBtn"></button>

    <div class="ui hidden" id="resultPanel">
      <div class="result-head">
        <div class="kicker" id="resKicker"></div>
        <h1 id="resTitle"></h1>
      </div>
      <div class="result-card">

    <div id="toast"></div>

</section>

// ── 정적 라벨 세팅 ──────────────────────────────────────────
$('introTitle').textContent = tt('introTitle');
$('introSub').textContent = tt('introSub');
$('startBtn').textContent = tt('start');
$('introHome').textContent = tt('home');
$('backBtn').textContent = tt('back');
$('resKicker').textContent = tt('kicker');
$('shareBtn').textContent = tt('share');
$('adoptBtn').textContent = tt('adopt');
$('retryBtn').textContent = tt('retry');
$('jellyN').textContent = state.jelly;

function toast(msg, ms = 2200) {
  const el = $('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(el._t);
  el._t = setTimeout(() => el.classList.remove('show'), ms);
}

function showScreen(name) {
  $('introPanel').classList.toggle('hidden', name !== 'intro');
  $('quizPanel').classList.toggle('hidden', name !== 'quiz');
  $('resultPanel').classList.toggle('hidden', name !== 'result');
}

// ── 상태 ────────────────────────────────────────────────────
let currentIndex = 0;
const answers = [];
let stage = null;
let rewarded = false;

// ── 문항 진행 ───────────────────────────────────────────────
function renderQuestion(i) {
  const item = QUESTIONS[i];
  $('progFill').style.width = `${(i / QUESTIONS.length) * 100}%`;
  $('qNum').textContent = `${i + 1} / ${QUESTIONS.length}`;
  $('qText').textContent = item.q[lang] ?? item.q.en;

  const opts = $('qOpts');
  opts.innerHTML = '';
  item.a.forEach((opt) => {
    const b = document.createElement('button');
    b.className = 'opt';
    b.type = 'button';
    b.textContent = opt[lang] ?? opt.en;
    b.onclick = () => choose(opt);
    opts.appendChild(b);
  });

  $('backBtn').disabled = i === 0;
}

function goToQuestion(i) {
  currentIndex = i;
  renderQuestion(i);
  showScreen('quiz');
}

function choose(opt) {
  answers[currentIndex] = opt;
  if (currentIndex + 1 < QUESTIONS.length) goToQuestion(currentIndex + 1);
  else showResult();
}

$('backBtn').onclick = () => { if (currentIndex > 0) goToQuestion(currentIndex - 1); };

// ── 결과 계산 (동점이면 마지막 응답 성향 우선) ──────────────
function computeBreed() {
  const totals = [0, 0, 0, 0];
  answers.forEach((opt) => opt.s.forEach((v, i) => totals[i] += v));
  const max = Math.max(...totals);
  const tied = totals.map((v, i) => i).filter((i) => totals[i] === max);
  if (tied.length === 1) return tied[0];
  for (let k = answers.length - 1; k >= 0; k--) {
    const s = answers[k].s;
    let best = 0, bi = -1;
    tied.forEach((i) => { if (s[i] > best) { best = s[i]; bi = i; } });
    if (bi >= 0) return bi;
  }
  return tied[0];
}

// ── 퀴즈 시작 / 다시하기 ────────────────────────────────────
function startQuiz() {
  if (stage) { stage.destroy(); stage = null; }
  answers.length = 0;
  rewarded = false;
  goToQuestion(0);
}
$('startBtn').onclick = startQuiz;
$('retryBtn').onclick = startQuiz;

// ── 결과 화면 ───────────────────────────────────────────────
function showResult() {
  const breed = computeBreed();
  const r = RESULTS[breed];
  const breedName = t(`breed.${breed}`);

  $('resTitle').textContent = lang === 'ko'
    ? `당신은 ${breedName}상!`
    : `You’re a ${breedName} type!`;
  $('resDesc').innerHTML = (r.desc[lang] ?? r.desc.en).join('<br>');
  $('resCompat').textContent = r.compat[lang] ?? r.compat.en;
  $('adoptBtn').href = `../?adopt=${breed}`;

  if (stage) { stage.destroy(); stage = null; }
  try {
    stage = new CatStage({ tl: $('tl'), gl: $('gl'), ov: $('ov'), breeds: [breed] });
  } catch (e) {
    $('fallback').style.display = 'grid';
    $('fallback').textContent = 'WebGL2 required. / WebGL2 가 필요합니다.';
    throw e;
  }
  setTimeout(() => stage && stage.react('happy'), 500);

  if (!rewarded) {
    rewarded = true;
    state = store.mutate((s) => {
      s.jelly += 5;
      s.stats.quizDone = (s.stats.quizDone || 0) + 1;
    });
    $('jellyN').textContent = state.jelly;
    toast(tt('reward'));
  }

  // 공유 카드 (결과 품종 기준)
  $('shareBtn').onclick = () => shareCard(breed, breedName);

  showScreen('result');
}

// ── 공유 카드 ───────────────────────────────────────────────
function shareCard(breed, breedName) {
  if (!stage) return;
  const snap = stage.snapshot();
  const card = document.createElement('canvas');
  card.width = 1000; card.height = 1250;
  const x = card.getContext('2d');
  x.fillStyle = '#e8e1ce'; x.fillRect(0, 0, 1000, 1250);

  // 상단 결과 문구
  const phrase = lang === 'ko' ? `나는 ${breedName}상` : `I’m a ${breedName} type`;
  x.fillStyle = '#33291d';
  x.font = '600 56px Georgia, serif';
  x.textAlign = 'center';
  x.fillText(phrase, 500, 148);

  // 고양이 (중앙 정사각 크롭)
  const srcW = Math.min(snap.width, snap.height * 0.8);
  const sx0 = (snap.width - srcW) / 2;
  const sy0 = Math.max(0, (snap.height - srcW) / 2 - snap.height * 0.07);
  x.drawImage(snap, sx0, sy0, srcW, srcW, 90, 200, 820, 820);
  x.strokeStyle = '#33291d'; x.lineWidth = 3;
  x.strokeRect(90, 200, 820, 820);

  // 하단
  x.fillStyle = '#6f6350';
  x.font = '30px Georgia, serif';
  x.fillText(lang === 'ko' ? '나와 닮은 고양이는?' : 'which cat are you?', 500, 1108);
  x.fillStyle = '#a44a2a';
  x.font = '28px Menlo, monospace';
  x.fillText('catnip.fun', 500, 1168);

  card.toBlob(async (blob) => {
    const file = new File([blob], 'which-cat-am-i.png', { type: 'image/png' });
    if (navigator.canShare && navigator.canShare({ files: [file] })) {
      try { await navigator.share({ files: [file], title: 'catnip' }); return; } catch { /* 취소 */ }
    }
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'which-cat-am-i.png';
    a.click();
    toast(tt('saved'));
  }, 'image/png');
}

showScreen('intro');
</script>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>quiet room — catnip</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>😴</text></svg>">
<meta name="description" content="A focus timer where your cat naps beside you. Finish a session, earn jelly. catnip 조용한 방: 고양이가 자는 동안 집중하고, 완주하면 젤리를 받으세요.">
<meta property="og:title" content="catnip — quiet room">
<meta property="og:description" content="Focus while your cat sleeps. 고양이가 자는 동안 집중하세요.">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary_large_image">
<style>
  :root{
    --paper:#e8e1ce;
    --paper-hi:#f3eddc;
    --ink:#33291d;
    --ink-soft:#6f6350;
    --rust:#a44a2a;
    --mono:ui-monospace,"SF Mono",Menlo,Consolas,monospace;
    --serif:"Iowan Old Style","Palatino Linotype",Palatino,Georgia,serif;
  }
  html,body{height:100%}
  body{
    margin:0;overflow:hidden;background:var(--paper);color:var(--ink);
    font-family:var(--serif);
    background-image:url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" width="160" height="160"><filter id="n"><feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2"/><feColorMatrix values="0 0 0 0 0.35 0 0 0 0 0.30 0 0 0 0 0.22 0 0 0 0.05 0"/></filter><rect width="160" height="160" filter="url(%23n)"/></svg>');
  }
  .stage{position:relative;height:100vh;min-height:520px;overflow:hidden}
  .stage canvas{position:absolute;inset:0;width:100%;height:100%;display:block}
  #ov{touch-action:none}
  .overlay{position:absolute;inset:0;pointer-events:none}
  .overlay .ui{pointer-events:auto}

  .hud-top{
    position:absolute;top:0;left:0;right:0;
    display:flex;justify-content:space-between;align-items:center;
    padding:20px 28px;font-family:var(--mono);font-size:13px;letter-spacing:.06em;
  }
  .wordmark{font-weight:700;font-size:15px;color:var(--ink);text-decoration:none}
  .jelly{background:var(--paper-hi);border:1px solid var(--ink);padding:5px 12px;font-weight:600}

  .clock{
    position:absolute;top:64px;left:50%;transform:translateX(-50%);
    font-family:var(--mono);font-size:64px;font-weight:600;letter-spacing:.04em;
    color:var(--ink);font-variant-numeric:tabular-nums;
    text-shadow:0 1px 0 rgba(243,237,220,.5);
  }
  @media (max-width:520px){ .clock{font-size:48px;top:72px} }
  .giveup{
    position:absolute;bottom:40px;left:50%;transform:translateX(-50%);
    opacity:.7;
  }
  .giveup:hover{opacity:1}

  .panel{
    position:absolute;inset:0;display:grid;place-items:center;
    background:rgba(232,225,206,.75);backdrop-filter:blur(3px);
  }
  .panel .card{
    background:var(--paper-hi);border:1px solid var(--ink);
    padding:32px 40px;display:flex;flex-direction:column;gap:18px;align-items:center;
    font-family:var(--mono);text-align:center;
  }
  .panel h2{margin:0;font-family:var(--serif);font-weight:500;font-size:24px}
  .panel .hint{font-size:11.5px;color:var(--ink-soft);max-width:260px;line-height:1.7}
  .panel .big{font-size:34px;font-weight:700}
  .row{display:flex;gap:10px}

  .durations{display:flex;gap:12px}
  .dur{
    appearance:none;border:1px solid var(--ink);background:var(--paper-hi);color:var(--ink);
    font-family:var(--mono);cursor:pointer;
    display:flex;flex-direction:column;align-items:center;gap:3px;
    padding:16px 18px;min-width:74px;transition:background .12s,color .12s;
  }
  .dur:hover{background:var(--ink);color:var(--paper-hi)}
  .dur .m{font-size:28px;font-weight:700;line-height:1}
  .dur .u{font-size:10px;letter-spacing:.1em;opacity:.75}
  .dur .rew{font-size:11px;margin-top:4px}

  .btn{
    appearance:none;border:1px solid var(--ink);background:var(--paper-hi);color:var(--ink);
    font-family:var(--mono);font-size:12px;letter-spacing:.06em;
    padding:10px 18px;cursor:pointer;text-decoration:none;
  }
  .btn.primary{background:var(--ink);color:var(--paper-hi)}
  #toast{
    position:absolute;top:72px;left:50%;transform:translateX(-50%);
    background:var(--ink);color:var(--paper-hi);
    font-family:var(--mono);font-size:12px;padding:9px 16px;
    opacity:0;transition:opacity .25s;pointer-events:none;
  }
  #toast.show{opacity:1}
  .fallback{
    position:absolute;inset:0;display:none;place-items:center;
    font-family:var(--mono);font-size:13px;color:var(--rust);
  }
  .hidden{display:none !important}
</style>
</head>
<body>
<section class="stage">
  <canvas id="tl"></canvas>
  <canvas id="gl"></canvas>
  <canvas id="ov"></canvas>
  <div class="fallback" id="fallback">WebGL2 required.</div>
  <div class="overlay">
    <div class="hud-top">
      <a class="wordmark" href="../">catnip</a>
      <span class="jelly">🐾 <span id="jellyN">0</span></span>
    </div>

    <div class="clock ui hidden" id="clock">25:00</div>
    <button class="btn giveup ui hidden" id="giveupBtn"></button>

    <div class="panel ui" id="startPanel">
      <div class="card">
        <h2 id="tTitle"></h2>
        <div class="hint" id="tHint"></div>
        <div class="durations">
          <button class="dur" data-min="15" data-jelly="8"><span class="m">15</span><span class="u u-min"></span><span class="rew">+8 🐾</span></button>
          <button class="dur" data-min="25" data-jelly="15"><span class="m">25</span><span class="u u-min"></span><span class="rew">+15 🐾</span></button>
          <button class="dur" data-min="50" data-jelly="35"><span class="m">50</span><span class="u u-min"></span><span class="rew">+35 🐾</span></button>
        </div>
        <a class="btn" href="../" id="tHome"></a>
      </div>
    </div>

    <div class="panel ui hidden" id="endPanel">
      <div class="card">
        <h2 id="tDone"></h2>
        <div class="big">+<span id="earnedN">0</span> 🐾</div>
        <div class="row">
          <button class="btn primary" id="againBtn"></button>
          <a class="btn" href="../" id="tHome2"></a>
        </div>
      </div>
    </div>

    <div id="toast"></div>
  </div>
</section>

<script type="module">
import { CatStage } from './engine/cat-stage.js';
import * as store from './engine/save.js';
import { lang } from './engine/i18n.js';

// ── 로컬 i18n (focus 전용 문구) ─────────────────────────────
const STR = {
  en: {
    title: 'quiet room',
    hint: 'stay focused while your cat sleeps beside you — finish the session to earn jelly.',
    min: 'min',
    home: 'home',
    give: 'give up',
    done: 'your cat slept well',
    again: 'one more',
    gaveUp: 'maybe next time!',
    doneTitle: 'done',
  },
  ko: {
    title: '조용한 방',
    hint: '고양이가 자는 동안 집중하세요… 세션을 끝내면 젤리를 받아요.',
    min: '분',
    home: '집으로',
    give: '그만하기',
    done: '고양이가 잘 잤어요',
    again: '한 번 더',
    gaveUp: '다음에 다시!',
    doneTitle: '완료',
  },
};
const L = (k) => (STR[lang] && STR[lang][k]) ?? STR.en[k] ?? k;

document.documentElement.lang = lang;
const $ = (id) => document.getElementById(id);
const rand = (a, b) => a + Math.random() * (b - a);

// 정적 라벨 적용
$('tTitle').textContent = L('title');
$('tHint').textContent = L('hint');
$('tHome').textContent = L('home');
$('tHome2').textContent = L('home');
$('giveupBtn').textContent = L('give');
$('tDone').textContent = L('done');
$('againBtn').textContent = L('again');
for (const el of document.querySelectorAll('.u-min')) el.textContent = L('min');

const idleTitle = `${L('title')} — catnip`;
document.title = idleTitle;

let state = store.load();
if (!state.cat) location.href = '../';   // 입양 전이면 홈으로
$('jellyN').textContent = state.jelly;

let stage;
try {
  stage = new CatStage({ tl: $('tl'), gl: $('gl'), ov: $('ov'), breeds: [state.cat?.breed ?? 0] });
} catch (e) {
  $('fallback').style.display = 'grid';
  throw e;
}

// ── 세션 상태 ───────────────────────────────────────────────
let playing = false;
let endAt = 0;             // 절대 종료 시각 (Date.now 기준) — setInterval 드리프트 방지
let sessionMin = 0, sessionJelly = 0;
let tickId = null;
let nextSwingAt = 0;       // 꼬리 잔스윙 예약 (performance.now 기준)
let audioCtx = null;       // 완주 차임용

function toast(msg, ms = 1400) {
  const el = $('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(el._t);
  el._t = setTimeout(() => el.classList.remove('show'), ms);
}

const fmt = (ms) => {
  const s = Math.max(0, Math.ceil(ms / 1000));
  return `${Math.floor(s / 60)}:${String(s % 60).padStart(2, '0')}`;
};

function ensureAudio() {
  if (audioCtx) return;
  try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch { audioCtx = null; }
}

// 부드러운 3음 사인 차임
function chime() {
  const ac = audioCtx;
  if (!ac) return;
  if (ac.state === 'suspended') ac.resume();
  const now = ac.currentTime;
  [523.25, 659.25, 783.99].forEach((f, i) => {
    const o = ac.createOscillator(), g = ac.createGain();
    o.type = 'sine'; o.frequency.value = f;
    const start = now + i * 0.18;
    g.gain.setValueAtTime(0.0001, start);
    g.gain.linearRampToValueAtTime(0.16, start + 0.04);
    g.gain.exponentialRampToValueAtTime(0.0008, start + 0.9);
    o.connect(g).connect(ac.destination);
    o.start(start); o.stop(start + 0.95);
  });
}

function tick() {
  if (!playing) return;
  const rem = endAt - Date.now();
  if (rem <= 0) { complete(); return; }
  const txt = fmt(rem);
  $('clock').textContent = txt;
  document.title = `(${txt}) catnip`;
}

function startSession(min, jelly) {
  sessionMin = min; sessionJelly = jelly;
  endAt = Date.now() + min * 60 * 1000;
  playing = true;
  stage.petMeter = 0;
  nextSwingAt = performance.now() + rand(20000, 40000);
  ensureAudio();
  stage._initAudio?.();   // 엔진 내장 골골 오디오 (start 클릭 = 유저 제스처)

  $('startPanel').classList.add('hidden');
  $('endPanel').classList.add('hidden');
  $('clock').classList.remove('hidden');
  $('giveupBtn').classList.remove('hidden');

  tick();
  clearInterval(tickId);
  tickId = setInterval(tick, 200);
}

function endSessionUI() {
  playing = false;
  clearInterval(tickId);
  stage.setExtraOffset(0, 0);
  $('clock').classList.add('hidden');
  $('giveupBtn').classList.add('hidden');
}

function complete() {
  endSessionUI();
  stage.petMeter = 0;        // 고양이가 깨어남 (눈 뜸)
  stage.react('happy');      // 하트 + 골골 반응

  const earned = sessionJelly, mins = sessionMin;
  state = store.mutate((s) => {
    s.jelly += earned;
    s.stats.focusMinutes = (s.stats.focusMinutes || 0) + mins;
  });
  $('jellyN').textContent = state.jelly;
  $('earnedN').textContent = earned;

  chime();
  document.title = `✅ ${L('doneTitle')} — catnip`;
  if (typeof Notification !== 'undefined' && Notification.permission === 'granted') {
    try { new Notification(L('done'), { body: `+${earned} 🐾` }); } catch { /* 무시 */ }
  }

  $('endPanel').classList.remove('hidden');
}

function giveUp() {
  endSessionUI();
  stage.petMeter = 0;        // 고양이가 깸 (보상·벌점 없음)
  document.title = idleTitle;
  toast(L('gaveUp'));
  $('startPanel').classList.remove('hidden');
}

// 돌아왔을 때 남은 시간 즉시 동기화 (백그라운드 중에도 절대시간으로 계속 진행)
document.addEventListener('visibilitychange', () => {
  if (!document.hidden) tick();
});

for (const b of document.querySelectorAll('.dur'))
  b.onclick = () => startSession(+b.dataset.min, +b.dataset.jelly);
$('giveupBtn').onclick = giveUp;
$('againBtn').onclick = () => { $('endPanel').classList.add('hidden'); $('startPanel').classList.remove('hidden'); };

// ── 수면 연출 + 어둑한 비네트 (오버레이 위 추가 드로잉) ──────
stage.onFrame = (t, octx, { W, H }) => {
  if (!playing) return;

  // 고양이는 서서히 잠듦 → 엔진 내장 눈감김 + 골골
  stage.petMeter = Math.min(1, stage.petMeter + 0.02);

  // 이따금 꼬리 잔스윙
  if (t >= nextSwingAt) { stage.excite(1); nextSwingAt = t + rand(20000, 40000); }

  // 반투명 잉크 비네트 (평소보다 살짝 어둑하게)
  const g = octx.createRadialGradient(W / 2, H * 0.52, Math.min(W, H) * 0.26, W / 2, H * 0.52, Math.max(W, H) * 0.78);
  g.addColorStop(0, 'rgba(28,22,14,0)');
  g.addColorStop(1, 'rgba(28,22,14,0.42)');
  octx.fillStyle = g;
  octx.fillRect(0, 0, W, H);
};
</script>
</body>
</html>
